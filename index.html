<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Klinik Kasih Anugerah Prima — Platform Kesehatan Digital terintegrasi untuk Dokter, Pasien, dan Apotek Mitra">
  <meta name="theme-color" content="#3A6FC9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Klinik Prima">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="assets/icons/icon-192.svg">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.svg">
  <title>Klinik Kasih Anugerah Prima — Platform Kesehatan Digital</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            teal: { 50:'#eef3fb', 100:'#d5e3f5', 200:'#aec6eb', 300:'#7da6df', 400:'#508ad4', 500:'#3a6fc9', 600:'#2e5cac', 700:'#24498a', 800:'#1a3768', 900:'#102448' },
            primary: { 50:'#eef3fb', 100:'#d5e3f5', 200:'#aec6eb', 300:'#7da6df', 400:'#508ad4', 500:'#3a6fc9', 600:'#2e5cac', 700:'#24498a', 800:'#1a3768', 900:'#102448' },
            accent: { 50:'#fef1ef', 100:'#fcdad6', 200:'#f9b3ab', 300:'#f58076', 400:'#ef5040', 500:'#e03b27', 600:'#c22f1e', 700:'#9e2418', 800:'#7a1c12', 900:'#56130d' }
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
            display: ['"Plus Jakarta Sans"', 'Inter', 'sans-serif']
          }
        }
      }
    }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">

  <style>
    [x-cloak] { display: none !important; }
    * { -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.5); }
    @media (prefers-color-scheme: dark) {
      input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
    }
  </style>

  <script>document.addEventListener('alpine:init', () => { window.__alpineReady = true; })</script>
</head>
<body class="bg-gray-50 antialiased">
  <div id="app">
    <!-- Loading splash -->
    <div class="min-h-screen flex items-center justify-center" style="background: linear-gradient(135deg, #0f172a 0%, #1c3980 50%, #3A6FC9 100%);">
      <div class="text-center">
        <div class="inline-block rounded-2xl overflow-hidden mb-5 shadow-2xl animate-pulse">
          <img src="assets/logos/klinik-prima-logo.png" alt="Klinik Prima" class="h-24 w-auto">
        </div>
        <h1 class="text-xl font-bold text-white">Klinik Kasih Anugerah Prima</h1>
        <p class="text-teal-200/70 text-sm mt-1">Memuat...</p>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
